<body>
<div style="text-align:center;">
    <h2 style="display: inline-block;font-size: 30px; margin-right:5px;">镜牢挑战</h2>
    <!-- 给按钮加上 id="btn" -->
    <button id="btn" onclick="showText()" style="padding:8px 20px; font-size:18px; border-radius:6px;">展开</button>
</div>

<div id="content" style="display: none; text-align:center;">
    <div style="text-align:center; margin:20px 0;">
    <h2>镜牢挑战抽取</h2>
    <button onclick="startDraw()" style="padding:8px 20px; font-size:18px; border-radius:6px;">开始抽取</button>
    <div id="result" style="margin-top:15px; font-size:30px; color:white;"></div>
</div>

<script>
function startDraw(){
    // 在这里填写所有候选内容，自由增删
    let list = [
        "候选条目1",
        "候选条目2",
        "候选条目3",
        "候选条目4",
        "候选条目5"
    ];
    // 随机获取下标
    let randomIndex = Math.floor(Math.random() * list.length);
    // 显示结果
    document.getElementById("result").innerText = list[randomIndex];
}
</script>
</div>

<script>
function showText(){
    let box = document.getElementById("content");
    let button = document.getElementById("btn");
    if(box.style.display === "none"){
        box.style.display = "block";
        button.innerText = "收起";  // 展开后文字变为收起
    }else{
        box.style.display = "none";
        button.innerText = "展开";  // 收起变回展开
    }
}
</script>
</body>
